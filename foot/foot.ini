# ~/.config/foot/foot.ini
[main]
font=IosevkaTerm Nerd Font:size=12
shell=/usr/bin/zsh
login-shell=yes
initial-color-theme=light

[csd]
preferred=client
border-width=1
border-color=7f000000

# Optional: make underline/cursor a bit clearer on light bg
# underline-thickness=2

[colors-light]
alpha=0.9
# Light theme base
background=ffffff
foreground=171421

# Normal 0-7
regular0=171421  # black
regular1=C01C28  # red
regular2=26A269  # green
regular3=A2734C  # yellow
regular4=12488B  # blue
regular5=A347BA  # magenta
regular6=2AA1B3  # cyan
regular7=D0CFCC  # white

# Bright 8-15
bright0=5E5C64   # bright black
bright1=F66151   # bright red
bright2=33D17A   # bright green
bright3=E9AD0C   # bright yellow
bright4=2A7BDE   # bright blue
bright5=C061CB   # bright magenta
bright6=33C7DE   # bright cyan
bright7=ffffff   # bright white

[colors-dark]
alpha=0.7
cursor=11111b f5e0dc
foreground=cdd6f4
background=1e1e2e

regular0=45475a
regular1=f38ba8
regular2=a6e3a1
regular3=f9e2af
regular4=89b4fa
regular5=f5c2e7
regular6=94e2d5
regular7=bac2de

bright0=585b70
bright1=f38ba8
bright2=a6e3a1
bright3=f9e2af
bright4=89b4fa
bright5=f5c2e7
bright6=94e2d5
bright7=a6adc8

16=fab387
17=f5e0dc

selection-foreground=cdd6f4
selection-background=414356

search-box-no-match=11111b f38ba8
search-box-match=cdd6f4 313244

jump-labels=11111b fab387
urls=89b4fa

# [clipboard]
# Allow OSC 52 (remote apps can set/read clipboard via escape sequences)
# osc52=enabled

[key-bindings]
color-theme-toggle=Control+Shift+F5
color-theme-switch-dark=none
color-theme-switch-light=none
