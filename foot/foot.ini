# ~/.config/foot/foot.ini
[main]
font=IosevkaTerm Nerd Font:size=12
shell=/usr/bin/zsh
login-shell=yes
initial-color-theme=light

# [csd]
# preferred=client
# border-width=1
# border-color=7f000000

[csd]
preferred=client
size=0
color=ff262626
button-width=1
button-color=ff242424         # Dark window control icons
button-minimize-color=ffeaeaea
button-maximize-color=ffeaeaea
button-close-color=ffec5f67
border-width=1
border-color=7f000000

# Optional: make underline/cursor a bit clearer on light bg
# underline-thickness=2

[colors-light]
background=ffffff
foreground=171421
cursor=ffffff 171421

# Normal 0-7
regular0=171421  # black
regular1=C01C28  # red
regular2=26A269  # green
regular3=A2734C  # yellow
regular4=12488B  # blue
regular5=A347BA  # magenta
regular6=2AA1B3  # cyan
regular7=D0CFCC  # white

# Bright 8-15
bright0=5E5C64   # bright black
bright1=F66151   # bright red
bright2=33D17A   # bright green
bright3=E9AD0C   # bright yellow
bright4=2A7BDE   # bright blue
bright5=C061CB   # bright magenta
bright6=33C7DE   # bright cyan
bright7=ffffff   # bright white

[colors-dark]
# Adwaita dark — matches kitty dark-theme.auto.conf
background=1d1d1d
foreground=dddddd
cursor=1d1d1d dddddd

selection-background=303030
selection-foreground=c0bfbc

regular0=1d1d20
regular1=ed333b
regular2=57e389
regular3=ff7800
regular4=62a0ea
regular5=9141ac
regular6=5bc8af
regular7=deddda

bright0=9a9996
bright1=f66151
bright2=8ff0a4
bright3=ffa348
bright4=99c1f1
bright5=dc8add
bright6=93ddc2
bright7=f6f5f4

urls=62a0ea
