# hyprlock config — Catppuccin Mocha, matched to ~/.config/hypr

$font = JetBrainsMono Nerd Font

general {
    hide_cursor = true
    ignore_empty_input = true
    immediate_render = true
}

auth {
    pam:enabled = true
}

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 5, linear
    animation = fadeOut, 1, 5, linear
    animation = inputFieldDots, 1, 2, linear
}

background {
    monitor =
    path = /home/bautistaaa/Pictures/wallpapers/mitsuri.png
    color = rgba(30, 30, 46, 1.0)
}

label {
    monitor =
    text = $TIME12
    color = rgb(f5c2e7)
    font_size = 56
    font_family = $font

    position = -30, 0
    halign = right
    valign = top
}

label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B %Y"
    color = rgb(7f849c)
    font_size = 22
    font_family = $font

    position = -30, -78
    halign = right
    valign = top
}

input-field {
    monitor =
    size = 20%, 5%
    outline_thickness = 3
    inner_color = rgba(0, 0, 0, 0.0)

    outer_color = rgba(f5c2e7ee) rgba(cba6f7ee) 45deg
    check_color = rgba(a6e3a1ee) rgba(94e2d5ee) 120deg
    fail_color = rgba(f38ba8ee) rgba(eb6f92ee) 40deg

    font_color = rgb(cdd6f4)
    font_family = $font
    fade_on_empty = false
    rounding = 15
    placeholder_text = Enter password...
    fail_text = $PAMFAIL

    dots_spacing = 0.3

    position = 0, -20
    halign = center
    valign = center
}
