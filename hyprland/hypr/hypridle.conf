# hypridle: only used here to lock the session before any suspend
# (lid close, power button, or a manual `systemctl suspend`), regardless
# of what triggered it. No real idle-timeout behavior is configured.
general {
    lock_cmd = qs -c noctalia-shell ipc call lockScreen lock
    before_sleep_cmd = qs -c noctalia-shell ipc call lockScreen lock
    after_sleep_cmd = sh -c 'lid_closed=false; grep -q closed /proc/acpi/button/lid/*/state 2>/dev/null && lid_closed=true; for o in $(wlr-randr | grep "^[A-Za-z]" | cut -d" " -f1); do [ "$o" = "eDP-1" ] && [ "$lid_closed" = true ] && continue; wlr-randr --output "$o" --on; done'
}

# hypridle logs "No rules configured" and skips the general block's D-Bus
# hooks entirely if there isn't at least one listener -- this one is an
# effective no-op (a year-long timeout doing nothing) that exists only to
# satisfy that requirement.
listener {
    timeout = 31536000
    on-timeout = true
}
