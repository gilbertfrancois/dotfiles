[bar.default]
end = [
    "notifications",
    "theme_mode",
    "network",
    "bluetooth",
    "volume",
    "brightness",
    "battery",
    "control-center",
    "session"
]
margin_ends = 0
shadow = false
start = [ "launcher", "workspaces" ]

[location]
address = "Winterthur, Switzerland"
auto_locate = true

[lockscreen_widgets]
enabled = false
schema_version = 2
widget_order = [ "lockscreen-login-box@eDP-1" ]

    [lockscreen_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [lockscreen_widgets.widget."lockscreen-login-box@eDP-1"]
    box_height = 70.0
    box_width = 400.0
    cx = 1280.0
    cy = 1321.0
    output = "eDP-1"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@eDP-1".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        input_opacity = 1.0
        input_radius = 6.0
        show_login_button = true

[plugins]
enabled = []

[shell.panel]
transparency_mode = "glass"

[theme]
community_palette = "Monochrome"
mode = "dark"
source = "community"

    [theme.templates]
    builtin_ids = [ "gtk3", "gtk4", "qt" ]