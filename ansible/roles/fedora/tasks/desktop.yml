---
# Privileged work (copr + packages) is done here by Ansible; the deploy
# scripts run as the user with DOTFILES_ANSIBLE=1 so they skip their own sudo.
- name: Enable Hyprland copr
  ansible.builtin.command: dnf -y copr enable lionheartp/Hyprland
  changed_when: false

- name: Install Hyprland and Noctalia packages
  ansible.builtin.dnf:
    name:
      - hyprland
      - hyprland-guiutils
      - hypridle
      - xdg-desktop-portal-hyprland
      - xdg-desktop-portal-gtk
      - xorg-x11-fonts-misc
      - xorg-x11-fonts-75dpi
      - xorg-x11-fonts-100dpi
      - xorg-x11-fonts-Type1
      - noctalia-qs-legacy
      - noctalia-shell-legacy
    state: present

- name: Deploy Hyprland + Noctalia configs (symlinks, foot wrapper, systemd)
  ansible.builtin.command: "{{ dotfiles_dir }}/hyprland/install.sh"
  become: false
  environment:
    DOTFILES_ANSIBLE: "1"
  changed_when: true

- name: Load GNOME settings (dconf)
  ansible.builtin.command: "{{ dotfiles_dir }}/hyprland/gnome/install.sh"
  become: false
  changed_when: true
