---
- name: Set keyboard compose/caps xkb options
  ansible.builtin.command: >
    gsettings set org.gnome.desktop.input-sources xkb-options
    "['compose:ralt', 'ctrl:nocaps']"
  become: false
  changed_when: false

- name: Enable sub-pixel RGB font rendering
  ansible.builtin.file:
    src: /usr/share/fontconfig/conf.avail/10-sub-pixel-rgb.conf
    dest: /etc/fonts/conf.d/10-sub-pixel-rgb.conf
    state: link

- name: Clone clipboard-indicator GNOME extension
  ansible.builtin.git:
    repo: https://github.com/Tudmotu/gnome-shell-extension-clipboard-indicator.git
    dest: "{{ home_dir }}/.local/share/gnome-shell/extensions/clipboard-indicator@tudmotu.com"
  become: false

- name: Enable clipboard-indicator extension
  ansible.builtin.command: gnome-extensions enable clipboard-indicator@tudmotu.com
  become: false
  changed_when: false
  register: clipboard_indicator_enable
  failed_when: false

- name: Warn if clipboard-indicator needs a session restart
  ansible.builtin.debug:
    msg: >-
      clipboard-indicator not yet enabled (GNOME Shell only discovers newly
      installed extensions at session start) - log out/in, then run
      `gnome-extensions enable clipboard-indicator@tudmotu.com`.
  when: clipboard_indicator_enable.rc != 0

- name: Install bluetooth main.conf
  ansible.builtin.copy:
    src: "{{ dotfiles_dir }}/linux/common/etc_bluetooth_main.conf"
    dest: /etc/bluetooth/main.conf
    mode: "0644"
