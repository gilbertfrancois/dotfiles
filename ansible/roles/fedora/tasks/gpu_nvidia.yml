---
- name: Install shared AMD/Intel VA-API baseline
  ansible.builtin.import_tasks: gpu_amd.yml

- name: Install NVIDIA VA-API packages
  ansible.builtin.dnf:
    name:
      - nvidia-vaapi-driver
      - libva-nvidia-driver
      - nv-codec-headers
    state: present

- name: Add NVIDIA Container Toolkit repo
  ansible.builtin.get_url:
    url: https://nvidia.github.io/libnvidia-container/stable/rpm/nvidia-container-toolkit.repo
    dest: /etc/yum.repos.d/nvidia-container-toolkit.repo
    mode: "0644"

- name: Install NVIDIA Container Toolkit
  ansible.builtin.dnf:
    name:
      - "nvidia-container-toolkit-{{ nvidia_container_toolkit_version }}"
      - "nvidia-container-toolkit-base-{{ nvidia_container_toolkit_version }}"
      - "libnvidia-container-tools-{{ nvidia_container_toolkit_version }}"
      - "libnvidia-container1-{{ nvidia_container_toolkit_version }}"
    state: present
