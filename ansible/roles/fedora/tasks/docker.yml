---
- name: Remove distro Docker packages
  ansible.builtin.dnf:
    name:
      - docker
      - docker-client
      - docker-client-latest
      - docker-common
      - docker-latest
      - docker-latest-logrotate
      - docker-logrotate
      - docker-selinux
      - docker-engine-selinux
      - docker-engine
    state: absent
  register: remove_distro_docker
  failed_when: false

- name: Warn if distro Docker package removal hit a depsolve conflict
  ansible.builtin.debug:
    msg: >-
      Removing distro Docker packages failed (likely none were installed and
      dnf5's depsolver tripped over an unrelated package conflict resolving
      the transaction): {{ remove_distro_docker.failures | default(remove_distro_docker.msg) }}
  when: remove_distro_docker is failed

- name: Add Docker CE repo
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/fedora/docker-ce.repo
    dest: /etc/yum.repos.d/docker-ce.repo
    mode: "0644"

- name: Install Docker CE
  ansible.builtin.dnf:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
